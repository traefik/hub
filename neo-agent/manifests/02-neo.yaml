---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: neo-agent
  namespace: neo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo-agent
  template:
    metadata:
      labels:
        app: neo-agent
    spec:
      serviceAccountName: neo-agent
      containers:
        - name: neo-agent
          image: gcr.io/traefiklabs/neo-agent:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /var/run/neo-agent/
              name: certs
          args:
            - --log-level=debug
            - --log-format=console
      volumes:
        - name: certs
          secret:
            secretName: neo-certs
            items:
              - key: tls.crt
                path: cert.pem
              - key: tls.key
                path: key.pem

---
apiVersion: v1
kind: Service
metadata:
  name: neo-agent
  namespace: neo
  labels:
    app: neo-agent
spec:
  type: ClusterIP
  ports:
    - port: 443
      name: neo-agent-webhook
    - port: 80
      name: neo-agent-auth
    - port: 40000
      name: neo-agent-debug
  selector:
    app: neo-agent

---
apiVersion: v1
kind: Secret
metadata:
  name: neo-certs
  namespace: neo
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
