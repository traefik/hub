---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: aws-secret-operator
  name: aws-secret-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-secret-operator
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - "*"
  - apiGroups:
      - mumoshu.github.io
    resources:
      - "*"
    verbs:
      - "*"
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: aws-secret-operator
subjects:
  - kind: ServiceAccount
    name: aws-secret-operator
    namespace: aws-secret-operator
  - kind: ServiceAccount
    name: aws-secret-operator
    namespace: orbula
roleRef:
  kind: ClusterRole
  name: aws-secret-operator
  apiGroup: rbac.authorization.k8s.io
