---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo-notification
  namespace: neo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo-notification
  template:
    metadata:
      labels:
        app: neo-notification
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: neo-notification
          image: gcr.io/traefiklabs/neo-notification:latest
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              port: 80
              path: /live
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              port: 80
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          env:
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  key: sendgrid-api-key
                  name: neo-secret
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
            - name: LOG_LEVEL
              value: debug
          args:
            - serve
            - --addr=:80
            - "--sendgrid-host=https://api.sendgrid.com/v3/"
            - "--sendgrid-endpoint=/mail/send"
            - "--sendgrid-alert-template-id=d-2b1b8c1c4e2c472c94f9e0276e724e14"
            - "--sendgrid-invitation-template-id=d-8f04099ff9e7406d8f58a444b2d52283"
            - "--sendgrid-from=noreply@traefik.io"
            - "--sendgrid-from-name=Me"

---
apiVersion: v1
kind: Service
metadata:
  name: neo-notification
  namespace: neo
  labels:
    app: neo-notification
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: neo-notification
  selector:
    app: neo-notification
