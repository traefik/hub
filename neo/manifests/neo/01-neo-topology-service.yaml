---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo-topology
  namespace: neo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo-topology
  template:
    metadata:
      labels:
        app: neo-topology
        version: "v1"
        k8s-app: neo-topology
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: neo-topology
          image: gcr.io/traefiklabs/neo-topology:latest
          imagePullPolicy: Always
          env:
            - name: FAKE_USER
              value: "test-topology"
            - name: FAKE_USER_TOKEN
              value: "4a585aab-f00e-4548-8528-222ef086bebb"
            - name: NEO_JWT_CERT
              value: ""
            - name: NEO_JWT_ISS
              value: "https://traefiklabs-neo-dev.eu.auth0.com/"
            - name: NEO_JWT_SUB
              value: "3J5WCTSPnEnKInmliKWf2hPcOBvnjEvi@clients"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github
                  key: token
            - name: GITHUB_ORG
              valueFrom:
                secretKeyRef:
                  name: github
                  key: org
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
          args:
            - serve
            - --addr=:80
            - --git-proxy-host=platform.docker.localhost

---
apiVersion: v1
kind: Service
metadata:
  name: neo-topology
  namespace: neo
  labels:
    app: neo-topology
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: neo-topology
  selector:
    app: neo-topology
