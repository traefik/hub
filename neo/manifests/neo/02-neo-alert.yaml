---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo-alert
  namespace: neo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo-alert
  template:
    metadata:
      labels:
        app: neo-alert
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: neo-alert
          image: gcr.io/traefiklabs/neo-alert:latest
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              port: 80
              path: /live
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              port: 80
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          env:
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
            - name: LOG_LEVEL
              value: debug
          args:
            - serve
            - --addr=:80
---
apiVersion: v1
kind: Service
metadata:
  name: neo-alert
  namespace: neo
  labels:
    app: neo-alert
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: neo-alert
  selector:
    app: neo-alert
