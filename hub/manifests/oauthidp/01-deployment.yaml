---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydra
  namespace: oauthidp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydra
  template:
    metadata:
      labels:
        app: hydra
    spec:
      containers:
        - name: oauthidp
          image: oryd/hydra:v1.11.8
          imagePullPolicy: IfNotPresent
          args:
            - 'serve'
            - 'all'
            - '--dangerous-force-http'
          env:
            - name: URLS_SELF_ISSUER
              value: http://hydra.hydra.svc.cluster.local:4444
            - name: URLS_CONSENT
              value: http://consent.hydra.svc.cluster.local:3000/consent
            - name: URLS_LOGIN
              value: http://consent.hydra.svc.cluster.local:3000/login
            - name: URLS_LOGOUT
              value: http://consent.hydra.svc.cluster.local:3000/logout
            - name: DSN
              value: memory
            - name: SECRETS_SYSTEM
              value: youReallyNeedToChangeThis
            - name: OIDC_SUBJECT_IDENTIFIERS_SUPPORTED_TYPES
              value: public,pairwise
            - name: OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT
              value: youReallyNeedToChangeThis
            - name: STRATEGIES_ACCESS_TOKEN
              value: jwt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consent
  namespace: oauthidp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consent
  template:
    metadata:
      labels:
        app: consent
    spec:
      containers:
        - name: consent
          image: jlevesy/hail-hydra:v0.0.1
          imagePullPolicy: IfNotPresent
          args:
            - '-a'
            - 'http://hydra.hydra.svc.cluster.local:4445'
            - '-b'
            - ':3000'
---
apiVersion: v1
kind: Service
metadata:
  name: hydra
  namespace: oauthidp
spec:
  ports:
    - name: http
      port: 4444
    - name: http2
      port: 4445
  selector:
    app: hydra
---
apiVersion: v1
kind: Service
metadata:
  name: consent
  namespace: oauthidp
spec:
  ports:
    - name: http
      port: 3000
  selector:
    app: consent

