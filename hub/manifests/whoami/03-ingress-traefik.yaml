---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-traefik
  namespace: whoami
#  annotations:
#    hub.traefik.io/access-control-policy: "my-acp@whoami"
spec:
  ingressClassName: traefik-lb
  rules:
    - host: traefik.docker.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80

