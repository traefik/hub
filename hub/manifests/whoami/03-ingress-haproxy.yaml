---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-haproxy
  namespace: whoami
  annotations:
    kubernetes.io/ingress.class: haproxy
#    hub.traefik.io/access-control-policy: "my-acp@whoami"
spec:
  rules:
    - host: haproxy.docker.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
