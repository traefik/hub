---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-ui
  namespace: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-ui
  template:
    metadata:
      labels:
        app: hub-ui
        version: "v1"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: hub-ui
          image: gcr.io/traefiklabs/hub-ui:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTH0_ISSUER_BASE_URL
              value: https://traefiklabs-hub-preview.eu.auth0.com
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: auth0-client-id
                  name: hub-secret
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: auth0-client-secret
                  name: hub-secret
            - name: AUTH0_AUDIENCE
              value: https://clients.hub.traefik.io/
            - name: AUTH0_COOKIE_LIFETIME
              value: "7200"
            - name: AUTH0_COOKIE_SECRET
              value: supersecretcookiewith32charactersatleast
            - name: AUTH0_DOMAIN
              value: https://traefiklabs-hub-preview.eu.auth0.com
            - name: AUTH0_SESSION_ROLLING_DURATION
              value: "7200"
            - name: AUTH0_SCOPE
              value: openid profile email offline_access
            - name: AUTH0_SECRET
              valueFrom:
                secretKeyRef:
                  key: auth0-secret
                  name: hub-secret
            - name: DEPLOY_URL
              value: "https://webapp.docker.localhost"
            - name: AUTH0_ADMIN_TOKEN
              value: "toto"
            - name: TOPOLOGY_SERVICE_ENDPOINT
              value: http://hub-topology/external
            - name: METRIC_SERVICE_ENDPOINT
              value: http://hub-metrics/external
            - name: WORKSPACE_SERVICE_ENDPOINT
              value: http://hub-workspace/external
            - name: CLUSTER_SERVICE_ENDPOINT
              value: http://hub-cluster/external
            - name: INVITATION_SERVICE_ENDPOINT
              value: http://hub-invitation/external
            - name: CERTIFICATE_SERVICE_ENDPOINT
              value: http://hub-certificates/external
            - name: ALERT_SERVICE_ENDPOINT
              value: http://hub-alert/external
            - name: NOTIFICATION_SERVICE_ENDPOINT
              value: http://hub-notification/external
            - name: OFFER_SERVICE_ENDPOINT
              value: http://hub-offer/external
            - name: GSLB_SERVICE_ENDPOINT
              value: http://hub-gslb/external
            - name: USER_SERVICE_ENDPOINT
              value: http://hub-user/external
            - name: USER_SERVICE_PUBLIC_ENDPOINT
              value: http://hub-user/public
            - name: TUNNEL_SERVICE_ENDPOINT
              value: http://hub-tunnel-orchestrator/external
            - name: ACP_SERVICE_ENDPOINT
              value: http://hub-acp/external
            - name: IS_LOCAL
              value: "true"
            - name: "NODE_TLS_REJECT_UNAUTHORIZED"
              value: "0"

---
apiVersion: v1
kind: Service
metadata:
  name: hub-ui
  namespace: hub
  labels:
    app: hub-ui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: hub-ui
  selector:
    app: hub-ui

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: hub-ui
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`webapp.docker.localhost`)
      services:
        - name: hub-ui
          port: 80
  tls:
    certResolver: default
