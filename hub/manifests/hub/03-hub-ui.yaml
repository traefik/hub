---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-ui
  namespace: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-ui
  template:
    metadata:
      labels:
        app: hub-ui
        version: "v1"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: hub-ui
          image: gcr.io/traefiklabs/hub-ui:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: auth0-client-id
                  name: hub-secret
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: auth0-client-secret
                  name: hub-secret
            - name: AUTH0_AUDIENCE
              value: https://clients.hub.traefik.io/
            - name: AUTH0_COOKIE_LIFETIME
              value: "7200"
            - name: AUTH0_COOKIE_SECRET
              value: supersecretcookiewith32charactersatleast
            - name: AUTH0_DOMAIN
              value: "https://traefiklabs-hub-preview.eu.auth0.com"
            - name: AUTH0_SCOPE
              value: openid profile email offline_access
            - name: DEPLOY_URL
              value: "https://webapp.docker.localhost"
            - name: AUTH0_ADMIN_TOKEN
              value: "toto"
            - name: ALERT_SERVICE_ENDPOINT
              value: "http://hub-alert.hub.svc.cluster.local/external"
            - name: TOPOLOGY_SERVICE_ENDPOINT
              value: "http://hub-topology.hub.svc.cluster.local/external"
            - name: METRIC_SERVICE_ENDPOINT
              value: "http://hub-metrics.hub.svc.cluster.local/external"
            - name: WORKSPACE_SERVICE_ENDPOINT
              value: "http://hub-workspace.hub.svc.cluster.local/external"
            - name: CLUSTER_SERVICE_ENDPOINT
              value: "http://hub-cluster.hub.svc.cluster.local/external"
            - name: INVITATION_SERVICE_ENDPOINT
              value: "http://hub-invitation.hub.svc.cluster.local/external"
            - name: CERTIFICATE_SERVICE_ENDPOINT
              value: "http://hub-certificates.hub.svc.cluster.local/external"
            - name: GSLB_SERVICE_ENDPOINT
              value: "http://hub-gslb.hub.svc.cluster.local/external"
            - name: OFFER_SERVICE_ENDPOINT
              value: "http://hub-offer.hub.svc.cluster.local/external"
            - name: IS_LOCAL
              value: "true"
            - name: "NODE_TLS_REJECT_UNAUTHORIZED"
              value: "0"

---
apiVersion: v1
kind: Service
metadata:
  name: hub-ui
  namespace: hub
  labels:
    app: hub-ui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: hub-ui
  selector:
    app: hub-ui

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: hub-ui
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`webapp.docker.localhost`)
      services:
        - name: hub-ui
          port: 80
  tls:
    certResolver: default
