---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-notification
  namespace: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-notification
  template:
    metadata:
      labels:
        app: hub-notification
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: hub-notification
          image: gcr.io/traefiklabs/hub-notification:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              port: 80
              path: /live
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              port: 80
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          env:
            - name: JWT_CERT
              valueFrom:
                secretKeyRef:
                  key: jwt-cert
                  name: hub-secret
            - name: JWT_ISS
              value: "https://traefiklabs-hub-preview.eu.auth0.com/"
            - name: JWT_SUB
              valueFrom:
                secretKeyRef:
                  key: jwt-sub
                  name: hub-secret
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  key: sendgrid-api-key
                  name: hub-secret
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
            - name: LOG_LEVEL
              value: debug
            - name: WORKSPACE_SERVICE_URL
              value: "http://hub-workspace.hub.svc.cluster.local/internal"
          args:
            - serve
            - --addr=:80
            - --sendgrid-host=https://api.sendgrid.com/v3/
            - --sendgrid-endpoint=/mail/send
            - --sendgrid-alert-template-id=d-e31e1f5ce35c4b95b8390d19ce1a2543
            - --sendgrid-invitation-template-id=d-31a4a51c91f245728e419d5980fe1bbc
            - --sendgrid-beta-invitation-template-id=d-57cb9d7ad67e4fddb83db4c9b372eb91
            - --sendgrid-welcome-template-id=d-267cf2806d0f4cdc99a1c1d2cbd6d3dc
            - --sendgrid-from=noreply@traefik.io
            - --sendgrid-from-name=Me
            - --mongodb-uri=mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/notification?authSource=admin

---
apiVersion: v1
kind: Service
metadata:
  name: hub-notification
  namespace: hub
  labels:
    app: hub-notification
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: hub-notification
  selector:
    app: hub-notification
