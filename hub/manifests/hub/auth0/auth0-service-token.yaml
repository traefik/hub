apiVersion: batch/v1
kind: CronJob
metadata:
  name: auth0-service-token
  namespace: hub
spec:
  schedule: "0 9 * * 1"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            cronjob: auth0-service-token
        spec:
          serviceAccountName: secret-writer
          restartPolicy: Never
          containers:
            - name: auth0-service-token
              imagePullPolicy: IfNotPresent
              image: mmatur/tools:latest
              command: [ "/bin/sh" ]
              env:
                - name: CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: hub-secret
                      key: hub-services-client-id
                - name: CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: hub-secret
                      key: hub-services-client-secret
              args:
                - -c
                - |
                  TOKEN=$(curl --request POST --url https://traefiklabs-hub-preview.eu.auth0.com/oauth/token \
                  --header 'content-type: application/json' \
                  --data "{\"client_id\":\"$CLIENT_ID\",\"client_secret\":\"$CLIENT_SECRET\",\"audience\":\"https://services.hub.traefik.io/\",\"grant_type\":\"client_credentials\"}" | jq -r .access_token | tr -d '\n') && \
                  TOKEN_B64=$(echo -n $TOKEN | base64 | tr -d '\n') && \
                  kubectl -n pop delete secret service-token || echo 1 && \
                  kubectl -n pop create secret generic service-token --from-literal=token="${TOKEN_B64}" && \
                  for service in hub-config-provider; do \
                    kubectl -n pop rollout restart deployment ${service} || true && \
                    kubectl -n pop rollout status deployment ${service} -w || true
                  done
