---
apiVersion: batch/v1
kind: Job
metadata:
  name: auth0-admin-token-renew
  namespace: hub
spec:
  template:
    spec:
      serviceAccountName: secret-writer
      restartPolicy: Never
      containers:
        - name: auth0-admin-token-renew
          imagePullPolicy: IfNotPresent
          image: mmatur/tools:latest
          command: ["/bin/sh"]
          env:
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: hub-services-client-id
                  name: hub-secret
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: hub-services-client-secret
                  name: hub-secret
          args:
            - -c
            - |
              URL=https://traefiklabs-hub-preview.eu.auth0.com

              TOKEN=$(curl -s --request POST --url ${URL}/oauth/token \
              --header 'content-type: application/json' \
              --data "{\"client_id\":\"${AUTH0_CLIENT_ID}\",\"client_secret\":\"${AUTH0_CLIENT_SECRET}\",\"audience\":\"${URL}/api/v2/\",\"grant_type\":\"client_credentials\"}" | jq -r .access_token | tr -d '\n') && \

              kubectl -n hub delete secret auth0-admin-token || echo 1 && \
              kubectl -n hub create secret generic auth0-admin-token --from-literal=token="${TOKEN}" && \
              kubectl -n hub rollout restart deployment hub-workspace
