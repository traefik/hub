---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hub-api-management-reconcile-job
  namespace: hub
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 5
      parallelism: 1
      template:
        metadata:
          labels:
            cronjob: hub-api-management-reconcile-job
        spec:
          containers:
            - args:
                - reconcile
              env:
                - name: DRY_RUN
                  value: "false"
                - name: LOG_LEVEL
                  value: debug
                - name: LOG_FORMAT
                  value: console
                - name: MONGODB_URI
                  value: mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/apimanagement?authSource=admin
                - name: MONGODB_MINPOOL
                  value: "1"
                - name: MONGODB_MAXPOOL
                  value: "3"
                - name: HYDRA_URL
                  value: http://hydra.hydra.svc.cluster.local:4445
                - name: BATCH_SIZE
                  value: "100"
              image: gcr.io/traefiklabs/hub-api-management:latest
              name: hub-api-management-reconcile-job
          imagePullSecrets:
            - name: gcr-access-token
          restartPolicy: Never
  schedule: '@daily'

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hub-api-management-check-unverified-job
  namespace: hub
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 5
      parallelism: 1
      template:
        metadata:
          labels:
            cronjob: hub-api-management-check-job
        spec:
          containers:
            - args:
                - check
              env:
                - name: DEV_MODE
                  value: "true"
                - name: MONGODB_URI
                  value: mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/apimanagement?authSource=admin
                - name: MONGODB_MINPOOL
                  value: "1"
                - name: MONGODB_MAXPOOL
                  value: "3"
                - name: MONGODB_ENCRYPTION_KEY
                  value: JUMqRi1KYU5jUmZValhuMnI1dTh4L0E/RChHK0tiUGU=
                - name: CERTIFICATES_SERVICE_URL
                  value: "http://hub-certificates.hub.svc.cluster.local/internal"
                - name: HYDRA_URL
                  value: http://hydra.hydra.svc.cluster.local:4445
                - name: LOG_LEVEL
                  value: debug
                - name: LOG_FORMAT
                  value: console
                - name: CNAME_DNS_CHALLENGE
                  value: "acme-challenge.preview.traefikhub.dev"
              image: gcr.io/traefiklabs/hub-api-management:latest
              name: hub-api-management-check-job
          imagePullSecrets:
            - name: gcr-access-token
          restartPolicy: Never
  schedule: '*/1 * * * *'

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hub-api-management-check-verified-job
  namespace: hub
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 5
      parallelism: 1
      template:
        metadata:
          labels:
            cronjob: hub-api-management-check-job
        spec:
          containers:
            - args:
                - check
              env:
                - name: VERIFIED_DOMAIN
                  value: "true"
                - name: DEV_MODE
                  value: "true"
                - name: MONGODB_URI
                  value: mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/apimanagement?authSource=admin
                - name: MONGODB_MINPOOL
                  value: "1"
                - name: MONGODB_MAXPOOL
                  value: "3"
                - name: MONGODB_ENCRYPTION_KEY
                  value: JUMqRi1KYU5jUmZValhuMnI1dTh4L0E/RChHK0tiUGU=
                - name: CERTIFICATES_SERVICE_URL
                  value: "http://hub-certificates.hub.svc.cluster.local/internal"
                - name: HYDRA_URL
                  value: http://hydra.hydra.svc.cluster.local:4445
                - name: LOG_LEVEL
                  value: debug
                - name: LOG_FORMAT
                  value: console
                - name: CNAME_DNS_CHALLENGE
                  value: "acme-challenge.preview.traefikhub.dev"

              image: gcr.io/traefiklabs/hub-api-management:latest
              name: hub-api-management-check-job
          imagePullSecrets:
            - name: gcr-access-token
          restartPolicy: Never
  schedule: '@daily'
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hub-api-management-sync-idp-job
  namespace: hub
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 5
      parallelism: 1
      template:
        metadata:
          labels:
            cronjob: hub-api-management-sync-idp-job
        spec:
          containers:
            - args:
                - sync-idps
              env:
                - name: LOG_LEVEL
                  value: debug
                - name: LOG_FORMAT
                  value: console
                - name: MONGODB_URI
                  value: mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/apimanagement?authSource=admin
                - name: MONGODB_MINPOOL
                  value: "1"
                - name: MONGODB_MAXPOOL
                  value: "3"
                - name: MQ_URL
                  value: nats://traefik-hub:traefik-hub@nats.nats.svc.cluster.local:4222
              image: gcr.io/traefiklabs/hub-api-management:latest
              name: hub-api-management-sync-idp-job
          imagePullSecrets:
            - name: gcr-access-token
          restartPolicy: Never
  schedule: '@hourly'
