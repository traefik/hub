      match: Host(`platform.docker.localhost`) && PathPrefix(`/api-management/external`)
      services:
        - name: hub-api-management
          port: 80
      middlewares:
        - name: stripprefix

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: api-management-sso-external-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`sso.portal.docker.localhost`) && (PathPrefix(`/login`) || PathPrefix(`/consent`) || PathPrefix(`/error`) || PathPrefix(`/reset-password`) || PathPrefix(`/static`) || PathPrefix(`/robots.txt`))
      services:
        - name: hub-api-management
          port: 80
      middlewares:
        - name: sso-prefix
  tls:
    certResolver: default

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: api-management-sso-external
  namespace: hub
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`sso.portal.docker.localhost`) && (PathPrefix(`/login`) || PathPrefix(`/consent`) || PathPrefix(`/error`) || PathPrefix(`/reset-password`) || PathPrefix(`/static`) || PathPrefix(`/robots.txt`))
      services:
        - name: hub-api-management
          port: 80
      middlewares:
        - name: sso-prefix

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: api-management-internal-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/api-management/internal`)
      services:
        - name: hub-api-management
