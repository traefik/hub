---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-certificates
  namespace: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-certificates
  template:
    metadata:
      labels:
        app: hub-certificates
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: hub-certificates
          image: gcr.io/traefiklabs/hub-certificates:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /config
              name: config-volume
          livenessProbe:
            httpGet:
              port: 80
              path: /live
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              port: 80
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          env:
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
            - name: JWT_CERT
              valueFrom:
                secretKeyRef:
                  key: jwt-cert
                  name: hub-secret
            - name: JWT_ISS
              value: "https://traefiklabs-hub-preview.eu.auth0.com/"
            - name: JWT_SUB
              valueFrom:
                secretKeyRef:
                  key: jwt-sub
                  name: hub-secret
            - name: RESOLVER_ACCOUNT
              value: 
            - name: LEGO_CA_CERTIFICATES
              value: /config/ca.pem
            - name: LEGO_CA_SERVER_NAME
              value: pebble
            - name: MONGODB_URI
              value: mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/certifications?authSource=admin
            - name: MONGODB_ENCRYPTION_KEY
              value: JUMqRi1KYU5jUmZValhuMnI1dTh4L0E/RChHK0tiUGU=
            - name: LOG_LEVEL
              value: debug
            - name: GSLB_SERVICE_URL
              value: http://hub-gslb.hub.svc.cluster.local/internal
            - name: NOTIFICATION_SERVICE_URL
              value: http://hub-notification.hub.svc.cluster.local/internal
            - name: WORKSPACE_SERVICE_URL
              value: http://hub-workspace.hub.svc.cluster.local/internal
            - name: HUB_DOMAIN_SUFFIX
              value: hub.traefik.io
            - name: CLOUDFLARE_EMAIL
              value: "email"
            - name: CLOUDFLARE_TOKEN
              value: token
            - name: CLOUDFLARE_KEY
              value: "key"
            - name: DEV_MODE
              value: "true"
          args:
            - serve
            - --addr=:80
      volumes:
        - name: config-volume
          configMap:
            name: pebble-ca
---
apiVersion: v1
kind: Service
metadata:
  name: hub-certificates
  namespace: hub
  labels:
    app: hub-certificates
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: hub-certificates
    - port: 443
      targetPort: 443
      name: hub-certificates-challenges
  selector:
    app: hub-certificates

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: certificates-agent
  namespace: hub
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && Path(`/agent/wildcard-certificate`)
      services:
        - name: hub-certificates
          port: 80
      middlewares:
        - name: auth-token

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: certificates-agent-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && Path(`/agent/wildcard-certificate`)
      services:
        - name: hub-certificates
          port: 80
      middlewares:
        - name: auth-token
  tls:
    certResolver: default

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: certificates-external-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/certificates/external`)
      services:
        - name: hub-certificates
          port: 80
      middlewares:
        - name: stripprefix
  tls:
    certResolver: default

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: certificates-external
  namespace: hub
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/certificates/external`)
