---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: platform-index-push
  namespace: hub
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && Method(`POST`) && Path(`/{repo:.+}/git-receive-pack`)
      services:
        - name: hub-topology-indexer-api
          passHostHeader: false
          port: 80
      middlewares:
        - name: push-indexer-prefix

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: platform-index-push-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && Method(`POST`) && Path(`/{repo:.+}/git-receive-pack`)
      services:
        - name: hub-topology-indexer-api
          passHostHeader: false
          port: 80
      middlewares:
        - name: push-indexer-prefix
  tls:
    certResolver: default

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: platform
  namespace: hub
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`)
      services:
        - name: gitea
          passHostHeader: false
          port: 443
      middlewares:
        - name: auth
        - name: gitea-token

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: platform-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`)
      services:
        - name: gitea
          passHostHeader: false
          port: 443
      middlewares:
        - name: auth
        - name: gitea-token
  tls:
    certResolver: default

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: auth
  namespace: hub
spec:
  forwardAuth:
    address: http://hub-topology.hub.svc.cluster.local:80/internal/auth

---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: hub
spec:
  type: ExternalName
  externalName: "${GITEA_HOSTNAME}"
