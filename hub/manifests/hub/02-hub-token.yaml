---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-token
  namespace: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-token
  template:
    metadata:
      labels:
        app: hub-token
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: hub-token
          image: gcr.io/traefiklabs/hub-token:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              port: 80
              path: /live
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              port: 80
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          env:
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
            - name: LOG_LEVEL
              value: debug
          args:
            - serve
            - --addr=:80
            - --mongodb-uri=mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/tokens?authSource=admin
---
apiVersion: v1
kind: Service
metadata:
  name: hub-token
  namespace: hub
  labels:
    app: hub-token
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: hub-token
    - port: 40000
      targetPort: 40000
      name: hub-token-debug
  selector:
    app: hub-token

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: token-internal-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/token/internal`)
      services:
        - name: hub-token
          port: 80
      middlewares:
        - name: stripprefix
  tls:
    certResolver: default

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: token-internal
  namespace: hub
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/token/internal`)
      services:
        - name: hub-token
          port: 80
      middlewares:
        - name: stripprefix
