---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: auth-token
  namespace: hub
spec:
  forwardAuth:
    address: http://hub-token.hub.svc.cluster.local:80/internal/verify-token
    authResponseHeaders:
      - Workspace-Id
      - Cluster-Id

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: sso-prefix
  namespace: hub
spec:
  addPrefix:
    prefix: /external/auth

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: stripprefix
  namespace: hub
spec:
  stripPrefix:
    prefixes:
      - /acp
      - /admin
      - /alert
      - /broker
      - /certificates
      - /check
      - /cluster
      - /gslb
      - /invitation
      - /metrics
      - /notification
      - /offer
      - /user
      - /token
      - /topology
      - /trace
      - /tunnel
      - /workspace
      - /api-management

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: auth
  namespace: hub
spec:
  forwardAuth:
    address: http://hub-topology.hub.svc.cluster.local:80/internal/auth

