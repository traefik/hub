---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-gslb
  namespace: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-gslb
  template:
    metadata:
      labels:
        app: hub-gslb
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: hub-gslb
          image: gcr.io/traefiklabs/hub-gslb:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              port: 80
              path: /live
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              port: 80
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          env:
            - name: JWT_CERT
              valueFrom:
                secretKeyRef:
                  key: jwt-cert
                  name: hub-secret
            - name: JWT_ISS
              value: "https://traefiklabs-hub-preview.eu.auth0.com/"
            - name: JWT_SUB
              valueFrom:
                secretKeyRef:
                  key: jwt-sub
                  name: hub-secret
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
            - name: MQ_URL
              value: nats://traefik-hub:traefik-hub@nats.nats.svc.cluster.local:4222
            - name: MONGODB_URI
              value: mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/gslb?authSource=admin
            - name: TRACE_SERVICE_URL
              value: http://hub-trace.hub.svc.cluster.local/internal
            - name: LOG_LEVEL
              value: debug
            - name: LOG_FORMAT
              value: console
          args:
            - serve
            - --addr=:80

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hub-gslb-enforce-quotas
  namespace: hub
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 5
      parallelism: 1
      template:
        metadata:
          labels:
            cronjob: hub-gslb-enforce-quotas
        spec:
          containers:
            - args:
                - enforce-bandwidth-quotas
              env:
                - name: MONGODB_URI
                  value: mongodb://root:admin@mongodb.mongo.svc.cluster.local:27017/apimanagement?authSource=admin
                - name: LOG_LEVEL
                  value: debug
                - name: MONGODB_MINPOOL
                  value: "1"
                - name: MONGODB_MAXPOOL
                  value: "3"
              image: gcr.io/traefiklabs/hub-gslb:latest
              name: hub-gslb-enforce-quotas
          imagePullSecrets:
            - name: gcr-access-token
          restartPolicy: Never
  schedule: '*/10 * * * *'
---
apiVersion: v1
kind: Service
metadata:
  name: hub-gslb
  namespace: hub
  labels:
    app: hub-gslb
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: hub-gslb
    - port: 40000
      targetPort: 40000
      name: hub-gslb-debug
  selector:
    app: hub-gslb

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: gslb-internal
  namespace: hub
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/gslb/internal`)
      services:
        - name: hub-gslb
          port: 80
      middlewares:
        - name: stripprefix

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: gslb-internal-tls
  namespace: hub
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/gslb/internal`)
      services:
        - name: hub-gslb
          port: 80
      middlewares:
        - name: stripprefix
