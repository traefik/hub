# Default values for hub-helm-chart.
image:
  tag: "experimental"
# User token to access to hub
token: "${TOKEN_CLUSTER}"
controllerDeployment:
  args:
    - --log-level=debug
    - --log-format=console
    - --ingress-class-name=traefik-lb
    - --platform-url=http://platform.docker.localhost/agent
    - --platform-idp-url=http://sso.portal.docker.localhost
    - --traefik.metrics-url=http://traefik-hub.traefik.svc.cluster.local:8080/metrics
tunnelDeployment:
  traefik:
    tunnelHost: traefik-hub.traefik.svc.cluster.local
    tunnelPort: 9901
  args:
    - --log-level=debug
    - --platform-url=http://platform.docker.localhost/agent
devPortalDeployment:
  args:
    - --log-level=debug
    - --platform-url=http://platform.docker.localhost/agent