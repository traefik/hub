---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  general.yaml: |

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-core
  namespace: monitoring
data:
  prometheus.yaml: |
    global:
      scrape_interval: 10s
      scrape_timeout: 10s
      evaluation_interval: 10s
    rule_files:
      - "/prometheus/rules/*.yaml"
    scrape_configs:      
      - job_name: 'traefik'
        relabel_configs:
            # Only scape pods with annotation prometheus.io/scrape: "true".
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
            # Use port given in annotation prometheus.io/port.
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
            # Add the version label extracted from the pod label version.
          - source_labels: [__meta_kubernetes_pod_label_version]
            action: replace
            replacement: $1
            target_label: version
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - traefik
      - job_name: 'hub'
        relabel_configs:
          # Only scape pods with annotation prometheus.io/scrape: "true".
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Use port given based on port name if it matches metrics-.*
          - source_labels: [__meta_kubernetes_pod_container_port_name, __meta_kubernetes_pod_container_port_number]
            action: replace
            regex: metrics-(.*);(\d+)
            replacement: ${2}
            target_label: __meta_kubernetes_pod_annotation_prometheus_io_port
          # Forgot non metrics ports.
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: keep
            regex: ([^:]+)(?::\d+)?;(\d+)
          # Use port given in annotation prometheus.io/port.
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Add the version label extracted from the pod label version.
          - source_labels: [__meta_kubernetes_pod_label_version]
            action: replace
            replacement: $1
            target_label: version
          # Add the namespace label extracted from the pod label namespace.
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            replacement: $1
            target_label: namespace
          # Add the job name extracted from the pod label app.
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            replacement: $1
            target_label: job
          # Add the name of the service from the label app.
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            replacement: $1
            target_label: service
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - hub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-core
  namespace: monitoring
  labels:
    app: prometheus
    component: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      name: prometheus-main
      labels:
        app: prometheus
        component: core
    spec:
      serviceAccountName: prometheus-k8s
      securityContext:
        fsGroup: 2000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: prom/prometheus:v2.44.0
          args:
            - '--storage.tsdb.retention=60d'
            - '--storage.tsdb.path="/prometheus/data/"'
            - '--web.enable-lifecycle'
            - '--web.enable-remote-write-receiver'
            - '--config.file=/prometheus/config/prometheus.yaml'
          ports:
            - name: web
              containerPort: 80
            - name: webui
              containerPort: 9090
          resources:
            requests:
              cpu: 500m
              memory: 500M
            limits:
              cpu: 500m
              memory: 500M
          volumeMounts:
            - name: config-volume
              mountPath: /prometheus/config
            - name: rules-volume
              mountPath: /prometheus/rules
            - name: prometheus-storage
              mountPath: /prometheus
        - name: configmap-reload
          image: jimmidyson/configmap-reload:v0.2.2
          imagePullPolicy: IfNotPresent
          args:
            - --volume-dir=/etc/config
            - --volume-dir=/etc/rules
            - --webhook-url=http://localhost:9090/-/reload
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: rules-volume
              mountPath: /etc/rules
              readOnly: true
          resources:
            limits:
              cpu: 10m
              memory: 10Mi
            requests:
              cpu: 10m
              memory: 10Mi
      volumes:
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-storage
        - name: config-volume
          configMap:
            name: prometheus-core
        - name: rules-volume
          configMap:
            name: prometheus-rules

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-remote-write
  namespace: monitoring
  labels:
    app: prometheus
    component: core
spec:
  ports:
    - port: 80
      protocol: TCP
      name: web
  selector:
    app: prometheus
    component: core

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    component: core
  annotations:
    prometheus.io/scrape: 'true'
spec:
  type: NodePort
  ports:
    - port: 9090
      protocol: TCP
      name: webui
  selector:
    app: prometheus
    component: core

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`prometheus.docker.localhost`)
      services:
        - name: prometheus
          port: 9090
          namespace: monitoring
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-tls
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`prometheus.docker.localhost`)
      services:
        - name: prometheus
          port: 9090
          namespace: monitoring
  tls:
    certResolver: default
