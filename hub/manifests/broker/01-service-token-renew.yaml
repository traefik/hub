---
apiVersion: batch/v1
kind: Job
metadata:
  name: service-token-renew
  namespace: broker
spec:
  template:
    spec:
      serviceAccountName: secret-writer
      restartPolicy: Never
      containers:
        - name: service-token-renew
          imagePullPolicy: IfNotPresent
          image: mmatur/tools:latest
          command: ["/bin/sh"]
          env:
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: hub-services-client-id
                  name: hub-secret
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: hub-services-client-secret
                  name: hub-secret
          args:
            - -c
            - |
              URL=https://traefiklabs-hub-preview.eu.auth0.com

              TOKEN=$(curl -s --request POST --url ${URL}/oauth/token \
              --header 'content-type: application/json' \
              --data "{\"client_id\":\"${AUTH0_CLIENT_ID}\",\"client_secret\":\"${AUTH0_CLIENT_SECRET}\",\"audience\":\"https://services.hub.traefik.io/\",\"grant_type\":\"client_credentials\"}" | jq -r .access_token | tr -d '\n') && \

              kubectl -n broker delete secret service-token || echo 1 && \
              kubectl -n broker create secret generic service-token --from-literal=token="${TOKEN}" && \
              kubectl -n broker rollout restart deployment hub-tunnel-broker
