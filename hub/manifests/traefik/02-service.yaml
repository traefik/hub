---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
spec:
  type: LoadBalancer
  ports:
    - protocol: TCP
      name: web
      port: 80
    - protocol: TCP
      name: websecure
      port: 443
    - protocol: TCP
      name: hub-catalog
      port: 9902
  selector:
    app: traefik

---
apiVersion: v1
kind: Service
metadata:
  name: traefik-hub
  namespace: traefik
spec:
  type: ClusterIP
  ports:
    - protocol: TCP
      name: metrics
      port: 8080
      targetPort: metrics
    - protocol: TCP
      port: 9901
      name: traefikhub-tunl
      targetPort: traefikhub-tunl
  selector:
    app: traefik

---
apiVersion: v1
kind: Service
metadata:
  name: traefik-metrics
  namespace: traefik
spec:
  type: ClusterIP
  ports:
    - protocol: TCP
      name: metrics
      port: 8080
  selector:
    app: traefik
