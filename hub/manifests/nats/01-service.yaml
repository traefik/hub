---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: nats
  labels:
    app: nats
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: hub
    app.kubernetes.io/version: "2.9.15-alpine"
spec:
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: hub
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: client
    port: 4222
    appProtocol: tcp
  - name: cluster
    port: 6222
    appProtocol: tcp
  - name: monitor
    port: 8222
    appProtocol: http
  - name: metrics
    port: 7777
    appProtocol: http
  - name: leafnodes
    port: 7422
    appProtocol: tcp
  - name: gateways
    port: 7522
    appProtocol: tcp

---
apiVersion: v1
kind: Service
metadata:
  name: nats-lb
  namespace: nats
spec:
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: hub
  type: LoadBalancer
  ports:
    - protocol: TCP
      name: client
      port: 4222
