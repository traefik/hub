---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-check
  namespace: pop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-check
  template:
    metadata:
      labels:
        app: hub-check
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
        - name: gcr-access-token
      containers:
        - name: hub-check
          image: gcr.io/traefiklabs/hub-check:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              port: 80
              path: /live
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              port: 80
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          env:
            - name: TRACING_ENDPOINT
              value: "http://jaeger.jaeger.svc.cluster.local:14268"
            - name: TRACING_PROBABILITY
              value: "1"
            - name: LOG_LEVEL
              value: debug
            - name: LOG_FORMAT
              value: console
          args:
            - serve
            - --addr=:80
---
apiVersion: v1
kind: Service
metadata:
  name: hub-check
  namespace: pop
  labels:
    app: hub-check
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: hub-check
    - port: 40000
      targetPort: 40000
      name: hub-check-debug
  selector:
    app: hub-check

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: check-internal-tls
  namespace: pop
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/check/internal`)
      services:
        - name: hub-check
          port: 80
      middlewares:
        - name: stripprefix
  tls:
    certResolver: default

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: check-internal
  namespace: pop
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`platform.docker.localhost`) && PathPrefix(`/check/internal`)
      services:
        - name: hub-check
          port: 80
      middlewares:
        - name: stripprefix
