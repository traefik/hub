apiVersion: v1
data:
  Corefile: |
    .:53 {
        errors
        health
        ready
        rewrite name k3d.hub-check.pop.svc.cluster.local hub-check.pop.svc.cluster.local
        rewrite name platform.docker.localhost traefik.traefik.svc.cluster.local
        rewrite name webapp.docker.localhost traefik.traefik.svc.cluster.local
        rewrite name regex (.*)\.tls.docker\.localhost neo-certificates.neo.svc.cluster.local
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        hosts /etc/coredns/NodeHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        forward . /etc/resolv.conf
        cache 30
        loop
        reload
        loadbalance
    }
kind: ConfigMap
metadata:
  annotations:
    objectset.rio.cattle.io/id: ""
    objectset.rio.cattle.io/owner-gvk: k3s.cattle.io/v1, Kind=Addon
    objectset.rio.cattle.io/owner-name: coredns
    objectset.rio.cattle.io/owner-namespace: kube-system
  name: coredns
  namespace: kube-system
