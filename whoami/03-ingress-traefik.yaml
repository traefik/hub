---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-traefik
  namespace: whoami
#   annotations:
#     hub.traefik.io/access-control-policy: "my-acp@app"
spec:
  ingressClassName: traefik-lb
  rules:
    - host: whoami.traefik.docker.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami-traefik
                port:
                  number: 80

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: app
  namespace: whoami
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`app.traefik.docker.localhost`)
      services:
        - name: whoami-traefik
          port: 80
    - kind: Rule
      match: Path(`/helloleszigotos`)
      services:
        - name: whoami-traefik
          port: 80
    - kind: Rule
      match: Host(`app.traefik.docker.localhost`) && Path(`/app`) && Headers(`X-Traefik`, `powpow`)
      services:
        - name: whoami-traefik
          port: 80
        - name: whoami-traefik
          port: 80
        - name: whoami-traefik
          port: 80
