---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-traefik
  namespace: whoami
#   annotations:
#     neo.traefik.io/access-control-policy: "my-acp@app"
spec:
  ingressClassName: traefik-lb
  rules:
    - host: whoami.traefik.neo.demo.traefiklabs.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80

---
apiVersion: v1
kind: Secret
metadata:
  name: tls
  namespace: whoami
data:
  tls.key: 
  tls.crt: 

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: app-tls
  namespace: whoami
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`app.traefik.neo.demo.traefiklabs.tech`)
      services:
        - name: whoami
          port: 80
    - kind: Rule
      match: Path(`/app`)
      services:
        - name: whoami
          port: 80
  tls:
    secretName: tls
