---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: traefik
  name: traefik

---
kind: Deployment
apiVersion: apps/v1
metadata:
  namespace: traefik
  name: traefik
  labels:
    app: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      containers:
        - name: traefik
          image: traefik:v2.3
          args:
            - --entrypoints.web.Address=:80
            - --entrypoints.websecure.Address=:443
            - --entrypoints.websecure.http.tls=true
            - --providers.kubernetescrd
            - --api.dashboard
            - --metrics.prometheus
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
